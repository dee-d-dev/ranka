version: "3.9"

services:
  app:
    build: .
    container_name: ranka
    ports:
      - "6000:6000"
    depends_on:
      - db
    env_file:
        - .env
    volumes:
      - .:/app
    restart: always

  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    ports:
    - "5434:5432"
    env_file:
        - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: